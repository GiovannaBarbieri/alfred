services:
  db:
    image: postgres:16-alpine
    container_name: analise-horas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-analise_horas}
      POSTGRES_USER: ${POSTGRES_USER:-analise_horas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-analise_horas}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-analise_horas} -d ${POSTGRES_DB:-analise_horas}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: analise-horas-api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://analise_horas:analise_horas@db:5432/analise_horas}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      SQLSERVER_DRIVER: ${SQLSERVER_DRIVER:-ODBC Driver 18 for SQL Server}
      SQLSERVER_HOST: ${SQLSERVER_HOST:-}
      SQLSERVER_PORT: ${SQLSERVER_PORT:-1433}
      SQLSERVER_DATABASE: ${SQLSERVER_DATABASE:-}
      SQLSERVER_AUTH: ${SQLSERVER_AUTH:-sql}
      SQLSERVER_USER: ${SQLSERVER_USER:-}
      SQLSERVER_PASSWORD: ${SQLSERVER_PASSWORD:-}
      SQLSERVER_ENCRYPT: ${SQLSERVER_ENCRYPT:-true}
      SQLSERVER_TRUST_CERT: ${SQLSERVER_TRUST_CERT:-true}
      SQLSERVER_CONNECTION_TIMEOUT_SECONDS: ${SQLSERVER_CONNECTION_TIMEOUT_SECONDS:-10}
      SQLSERVER_REQUEST_TIMEOUT: ${SQLSERVER_REQUEST_TIMEOUT:-60000}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
